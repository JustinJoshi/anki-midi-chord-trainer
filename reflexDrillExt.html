<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blocked Chord Drill — MIDI & Anki</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh; width: 100%; background: #16140F;
    display: flex; justify-content: center; padding: 32px 16px;
    font-family: 'Inter', system-ui, sans-serif;
  }

  .btn { transition: all 0.15s ease; cursor: pointer; }
  .btn:active { transform: scale(0.97); }
  .seg { transition: all 0.15s ease; cursor: pointer; }

  .wrap { width: 95%; max-width: 1800px; }

  .header { margin-bottom: 18px; text-align: center; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase; color: #C9A227; margin-bottom: 8px;
  }
  .title {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px;
    color: #EDE6D6; margin: 0; line-height: 1.3;
  }

  .midi-bar { display: flex; justify-content: center; margin-bottom: 18px; }
  .midi-warn { font-family: 'Inter', sans-serif; font-size: 13px; color: #C1614A; }
  .connect-btn {
    background: #C9A227; color: #16140F; border: none; border-radius: 999px;
    padding: 9px 18px; font-size: 13.5px; font-weight: 600; font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 8px;
  }
  .midi-connected-row {
    display: flex; align-items: center; gap: 8px; background: #1C1912;
    border: 1px solid #2c2820; border-radius: 999px; padding: 7px 14px;
  }
  .midi-connected-text { font-family: 'Inter', sans-serif; font-size: 13px; color: #7FA37A; font-weight: 500; }
  .midi-device-name { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #7A7156; }
  .midi-select {
    background: #211E17; color: #EDE6D6; border: 1px solid #34301F;
    border-radius: 8px; font-size: 12px; padding: 3px 6px;
  }

  .controls-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px 22px;
    margin-bottom: 22px;
  }
  .control-group {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    flex: 0 1 auto;
  }
  #rootGroup, #qualityGroup { flex-basis: 100%; }
  .segmented, .root-grid { justify-content: center; }
  .control-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: #A79B85;
  }
  .segmented { display: flex; gap: 8px; flex-wrap: wrap; }
  .seg-btn {
    background: #211E17; border: 1px solid #34301F; color: #A79B85;
    border-radius: 999px; padding: 8px 14px; font-size: 13px; font-family: 'Inter', sans-serif;
    font-weight: 500; display: flex; align-items: center; gap: 6px;
  }
  .seg-btn-active { background: #2A2510; border: 1px solid #C9A227; color: #E8CF7A; }
  .root-grid { display: flex; gap: 6px; flex-wrap: wrap; }
  .root-btn {
    background: #211E17; border: 1px solid #34301F; color: #A79B85;
    border-radius: 10px; padding: 8px 10px; font-size: 13px; min-width: 40px;
    font-family: 'JetBrains Mono', monospace; font-weight: 500;
  }

  .card {
    background: #1C1912; border: 1px solid #2c2820; border-radius: 24px;
    padding: 28px 24px; display: flex; flex-direction: column;
    align-items: center; gap: 10px;
  }
  .family-strip { display: flex; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; justify-content: center; }
  .family-chip {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 4px 10px;
    border-radius: 999px; border: 1px solid #34301F; color: #7A7156;
  }
  .family-chip-active { border: 1px solid #C9A227; color: #E8CF7A; background: #2A2510; }
  .family-chip-done { border: 1px solid #3d4a3a; color: #7FA37A; }

  .symbol {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 42px;
    color: #EDE6D6; letter-spacing: -0.01em;
  }
  .chord-notes { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #7A7156; }
  .status-pill {
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600; color: #A79B85;
    background: #211E17; border: 1px solid #34301F; border-radius: 999px;
    padding: 5px 14px; margin-top: 4px;
  }
  .status-timing { color: #E8CF7A; border: 1px solid #C9A227; background: #2A2510; }
  .status-success { color: #16140F; border: 1px solid #7FA37A; background: #7FA37A; }

  .live-timer {
    font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; color: #EDE6D6; margin-top: 4px;
  }
  .held-row { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #7A7156; min-height: 16px; }
  .rep-row { display: flex; gap: 20px; margin-top: 8px; }
  .rep-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #A79B85; }
  .progress-track {
    width: 100%; height: 6px; background: #2c2820; border-radius: 999px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: #C9A227; transition: width 0.1s linear; }

  .start-btn {
    background: #C9A227; color: #16140F; border: none; border-radius: 14px;
    padding: 13px 28px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 8px;
    width: 100%; justify-content: center; margin-top: 8px;
  }
  .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .stop-btn {
    background: transparent; color: #C1614A; border: 1px solid #C1614A; border-radius: 14px;
    padding: 12px 28px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 8px;
    width: 100%; justify-content: center; margin-top: 8px;
  }
  
  .complete-box { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; margin-top: 6px; }
  .complete-text { font-family: 'Fraunces', serif; font-size: 15px; color: #7FA37A; text-align: center; }
  .action-row { display: flex; gap: 10px; width: 100%; }
  
  .next-btn {
    background: transparent; color: #E8CF7A; border: 1px solid #C9A227; border-radius: 14px;
    padding: 12px 28px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 8px; width: 100%; justify-content: center;
  }
  
  .redo-btn {
    background: transparent; color: #A79B85; border: 1px solid #34301F; border-radius: 14px;
    padding: 12px 28px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 8px; width: 100%; justify-content: center;
  }

  .stats-row { display: flex; align-items: center; gap: 8px; margin-top: 20px; }
  .stat-box {
    flex: 1; min-width: 0; background: #1C1912; border: 1px solid #2c2820; border-radius: 14px;
    padding: 10px 6px; text-align: center;
  }
  .stat-value { font-family: 'Fraunces', serif; font-size: 16px; color: #EDE6D6; font-weight: 600; }
  .stat-label {
    font-family: 'Inter', sans-serif; font-size: 9.5px; color: #7A7156; margin-top: 2px;
    line-height: 1.25;
  }
  .reset-btn {
    background: #1C1912; border: 1px solid #2c2820; color: #A79B85; border-radius: 12px;
    padding: 12px; display: flex; align-items: center; justify-content: center;
  }

  .footnote {
    font-family: 'Inter', sans-serif; font-size: 12.5px; color: #7A7156;
    text-align: center; margin-top: 18px; line-height: 1.5;
  }

  button { font: inherit; }
  select { font: inherit; }
  input[type="number"].rep-input {
    background: #211E17; border: 1px solid #34301F; color: #EDE6D6;
    border-radius: 10px; padding: 8px 10px; font-size: 13px;
    font-family: 'Inter', sans-serif; font-weight: 500;
    width: 72px; text-align: center;
    -moz-appearance: textfield;
  }
  input[type="number"].rep-input::-webkit-outer-spin-button,
  input[type="number"].rep-input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  input[type="number"].rep-input:focus {
    outline: none; border-color: #C9A227;
  }

  /* Quality groups: label on the left, buttons flowing to the right */
  .quality-groups {
    display: flex; flex-direction: column; gap: 10px;
  }
  .quality-group {
    display: flex; align-items: center; gap: 10px;
  }
  .quality-group-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase; color: #A79B85;
    min-width: 42px; flex-shrink: 0; text-align: right;
  }
  .quality-group .segmented {
    flex: 1; flex-wrap: wrap;
  }

  .anki-sync-status {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #7A7156; min-height: 16px; margin-top: 2px;
  }
  .anki-sync-status-active { color: #7FA37A; }
  .anki-sync-status-error { color: #C1614A; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="eyebrow">blocked practice — anki verified</div>
      <h1 class="title">Play it for real. Anki reveals the answer.</h1>
    </div>

    <div class="midi-bar" id="midiBar"></div>

    <div class="controls-row">
      <div class="control-group">
        <span class="control-label">Drill mode</span>
        <div class="segmented" id="modeSeg"></div>
      </div>

      <div class="control-group" id="rootGroup">
        <span class="control-label">Root</span>
        <div class="root-grid" id="rootGrid"></div>
      </div>

      <div class="control-group" id="qualityGroup">
        <span class="control-label">Quality</span>
        <div class="segmented" id="qualitySeg"></div>
      </div>

      <div class="control-group">
        <span class="control-label">Reps per round</span>
        <div class="segmented" id="repSeg"></div>
      </div>

      <!-- New control group for toggling chord notes -->
      <div class="control-group">
        <span class="control-label">Chord Notes</span>
        <div class="segmented" id="displayNotesSeg"></div>
      </div>

      <!-- New control group for shuffling to a random chord -->
      <div class="control-group">
        <span class="control-label">Shuffle</span>
        <div class="segmented" id="shuffleSeg"></div>
      </div>

      <!-- New control group for following the current Anki review card -->
      <div class="control-group">
        <span class="control-label">Anki Sync</span>
        <div class="segmented" id="ankiSyncSeg"></div>
        <div class="anki-sync-status" id="ankiSyncStatus"></div>
      </div>
    </div>

    <div class="card">
      <div class="family-strip" id="familyStrip" style="display:none;"></div>

      <div class="symbol" id="symbolEl"></div>
      <div class="chord-notes" id="chordNotesEl"></div>

      <div class="status-pill" id="statusPill"></div>

      <div class="live-timer" id="liveTimerEl">—</div>

      <div class="held-row" id="heldRowEl">No keys held</div>

      <div class="rep-row">
        <span class="rep-label" id="repCountLabel">0 / 12 reps</span>
        <span class="rep-label" id="firstChordLabel" style="display:none;"></span>
        <span class="rep-label" id="avgLabel" style="display:none;"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%;"></div>
      </div>

      <button class="btn start-btn" id="startBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <span id="startBtnText">Connect MIDI first</span>
      </button>

      <button class="btn stop-btn" id="stopBtn" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
        Stop
      </button>

      <div class="complete-box" id="completeBox" style="display:none;">
        <div class="complete-text" id="completeText"></div>
        <div class="action-row">
          <button class="btn redo-btn" id="redoBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            <span>Redo</span>
          </button>
          <button class="btn next-btn" id="nextBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            <span id="nextBtnText">Next chord</span>
          </button>
        </div>
      </div>
    </div>

    <div class="stats-row" id="statsRow" style="display:none;">
      <div class="stat-box">
        <div class="stat-value" id="statBest">—</div>
        <div class="stat-label">fastest single rep</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="statAvg">—</div>
        <div class="stat-label">best round average</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">total reps</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="statFirstPress">—</div>
        <div class="stat-label">fastest first chord</div>
      </div>
      <button class="btn reset-btn" id="resetStatsBtn" title="Clear stats">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
    </div>

    <p class="footnote" id="ankiStatus">
      AnkiConnect Status: Checking...
    </p>
  </div>

<script>
(function () {
  // ---------- Music data ----------
  const SHARP_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
  const FLAT_NAMES  = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];

  const ROOTS = [
    { pc: 0,  name: "C",  flat: false },
    { pc: 1,  name: "Db", flat: true  },
    { pc: 2,  name: "D",  flat: false },
    { pc: 3,  name: "Eb", flat: true  },
    { pc: 4,  name: "E",  flat: false },
    { pc: 5,  name: "F",  flat: true  },
    { pc: 6,  name: "F#", flat: false },
    { pc: 7,  name: "G",  flat: false },
    { pc: 8,  name: "Ab", flat: true  },
    { pc: 9,  name: "A",  flat: false },
    { pc: 10, name: "Bb", flat: true  },
    { pc: 11, name: "B",  flat: false },
  ];

  // Qualities grouped by extension type. FAMILY, EXTENDED and SINGLE_QUALITIES
  // are derived from this structure so the rest of the app keeps working.
  const QUALITY_GROUPS = [
    {
      label: "7th",
      qualities: [
        { suffix: "maj7", tones: [0, 4, 7, 11] },
        { suffix: "7",    tones: [0, 4, 7, 10] },
        { suffix: "m7",   tones: [0, 3, 7, 10] },
        { suffix: "m7b5", tones: [0, 3, 6, 10] },
        { suffix: "dim7", tones: [0, 3, 6, 9]  },
      ],
    },
    {
      label: "9th",
      qualities: [
        { suffix: "9",        tones: [0, 4, 7, 10, 14] },
        { suffix: "maj9",     tones: [0, 4, 7, 11, 14] },
        { suffix: "m9",       tones: [0, 3, 7, 10, 14] },
        { suffix: "m9(maj7)", tones: [0, 3, 7, 11, 14] },
        { suffix: "7b9",      tones: [0, 4, 7, 10, 13] },
        { suffix: "7#9",      tones: [0, 4, 7, 10, 15] },
        { suffix: "m7b5(9)",  tones: [0, 3, 6, 10, 14] },
      ],
    },
    {
      label: "11th",
      qualities: [
        { suffix: "11",      tones: [0, 4, 7, 10, 14, 17] },
        { suffix: "maj11",   tones: [0, 4, 7, 11, 14, 17] },
        { suffix: "m11",     tones: [0, 3, 7, 10, 14, 17] },
        { suffix: "7#11",    tones: [0, 4, 7, 10, 14, 18] },
        { suffix: "maj7#11", tones: [0, 4, 7, 11, 14, 18] },
      ],
    },
    {
      label: "13th",
      qualities: [
        { suffix: "13",    tones: [0, 4, 7, 10, 14, 17, 21] },
        { suffix: "maj13", tones: [0, 4, 7, 11, 14, 17, 21] },
        { suffix: "m13",   tones: [0, 3, 7, 10, 14, 17, 21] },
        { suffix: "7b13",  tones: [0, 4, 7, 10, 20] },
        { suffix: "13b9",  tones: [0, 4, 7, 10, 13, 17, 21] },
        { suffix: "13#11", tones: [0, 4, 7, 10, 14, 18, 21] },
      ],
    },
  ];

  const FAMILY = QUALITY_GROUPS[0].qualities;
  const EXTENDED = QUALITY_GROUPS.slice(1).reduce((acc, g) => acc.concat(g.qualities), []);
  const SINGLE_QUALITIES = QUALITY_GROUPS.reduce((acc, g) => acc.concat(g.qualities), []);
  const REP_TARGETS = [8, 12, 16, 20];

  function noteName(pc, flat) {
    const n = ((pc % 12) + 12) % 12;
    return flat ? FLAT_NAMES[n] : SHARP_NAMES[n];
  }
  function buildChord(root, tones) {
    return tones.map((iv) => noteName(root.pc + iv, root.flat));
  }
  function pcSetOf(root, tones) {
    return new Set(tones.map((iv) => (root.pc + iv) % 12));
  }
  function setsEqual(a, b) {
    if (a.size !== b.size) return false;
    for (const x of a) if (!b.has(x)) return false;
    return true;
  }

  // ---------- State ----------
  const state = {
    mode: "single",
    root: ROOTS[0],
    qualityIdx: 0,
    repTarget: 12,
    showNotes: false, // <-- Added display state

    midiSupported: true,
    midiConnected: false,
    inputs: [],
    selectedInputId: null,
    midiAccess: null,

    running: false,
    phase: "idle", 
    repCount: 0,
    repTimes: [],
    liveMs: 0,
    heldNotesDisplay: [],
    justCompleted: false,
    history: {},

    ankiFollow: false,
    lastCardId: null,
    detectedChord: null,
    ankiSyncStatus: "Follow off",
  };

  const heldSet = new Set();
  let readyTime = null;
  let rafId = null;
  let audioCtx = null;
  let ankiPollId = null;

  // ---------- Persistence ----------
  const STORAGE_KEY = "blocked-drill-midi-history";
  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) state.history = JSON.parse(raw);
    } catch (e) { /* fresh */ }
  }
  function saveHistory() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.history));
    } catch (e) { /* ignore */ }
  }
  loadHistory();

  // ---------- Audio chime ----------
  function ensureAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }
  function playChime() {
    try {
      const ctx = ensureAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 1046.5; 
      const now = ctx.currentTime;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.35, now + 0.001);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.22);
    } catch (e) { /* audio not available */ }
  }

  // ---------- Anki Connect Integration ----------
  const ankiStatusEl = document.getElementById("ankiStatus");

  async function flipAnkiCard() {
    try {
      const res = await fetch("http://127.0.0.1:8765", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "guiShowAnswer", version: 6 })
      });
      const data = await res.json();
      if (data.error) {
        console.error("Anki Error:", data.error);
        ankiStatusEl.textContent = `Anki Error: ${data.error}`;
      } else {
        ankiStatusEl.textContent = "Anki card flipped successfully!";
      }
    } catch (e) {
      console.warn("Could not reach AnkiConnect.", e);
      ankiStatusEl.textContent = "Could not reach AnkiConnect. Is Anki running?";
    }
  }

  // Simple ping on load to check connection
  async function pingAnki() {
    try {
      const res = await fetch("http://127.0.0.1:8765", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "version", version: 6 })
      });
      if (res.ok) {
        ankiStatusEl.textContent = "✅ Connected to Anki. (Will flip upon completion)";
      }
    } catch (e) {
      ankiStatusEl.textContent = "⚠️ Anki not detected. (Open Anki with AnkiConnect to flip cards)";
    }
  }
  pingAnki();

  // ---------- Anki card-following sync ----------
  function parseChordFromText(text) {
    if (!text) return null;
    // Strip HTML tags and collapse whitespace.
    const plain = text.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();

    // Build suffix regex from known qualities, longest first to avoid ambiguity.
    const suffixes = SINGLE_QUALITIES.map((q) => q.suffix)
      .sort((a, b) => b.length - a.length)
      .map((s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    const suffixRe = suffixes.length ? `(${suffixes.join("|")})?` : "()?";

    // Root tokens — longer accidental names first so "C#" beats "C".
    const rootTokens = ["C#","Db","D#","Eb","F#","Gb","G#","Ab","A#","Bb","C","D","E","F","G","A","B"];

    // Avoid matching a root/suffix inside a larger token.
    // Optional whitespace between root and suffix handles "Gm7" and "G m7".
    const pattern = new RegExp(
      `(?<![A-Za-z#b♯♭0-9])(${rootTokens.join("|")})\\s*${suffixRe}(?![A-Za-z#b♯♭0-9])`,
      "i"
    );

    const m = plain.match(pattern);
    if (!m) return null;

    const rootName = m[1].toUpperCase();
    const suffix = m[2] || "";

    // Map any parsed root name to the closest ROOTS entry
    // (the app uses flats for enharmonic keys except F#).
    const rootMap = {
      "C": 0, "C#": 1, "DB": 1, "D": 2, "D#": 3, "EB": 3,
      "E": 4, "F": 5, "F#": 6, "GB": 6, "G": 7, "G#": 8,
      "AB": 8, "A": 9, "A#": 10, "BB": 10, "B": 11,
    };
    const pc = rootMap[rootName];
    if (pc === undefined) return null;
    const root = ROOTS.find((r) => r.pc === pc);
    if (!root) return null;

    const qualityIdx = SINGLE_QUALITIES.findIndex(
      (q) => q.suffix.toLowerCase() === suffix.toLowerCase()
    );
    if (qualityIdx === -1) return null;

    return { root, qualityIdx, suffix };
  }

  function applyAnkiChord(parsed) {
    stopDrill();
    state.mode = "single";
    state.root = parsed.root;
    state.qualityIdx = parsed.qualityIdx;
    state.detectedChord = `${parsed.root.name}${parsed.suffix}`;
    state.ankiSyncStatus = `Following: ${state.detectedChord}`;
    render();
  }

  async function pollAnkiCard() {
    if (!state.ankiFollow) return;

    try {
      const res = await fetch("http://127.0.0.1:8765", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "guiCurrentCard", version: 6 })
      });
      const data = await res.json();

      if (data.error) {
        state.ankiSyncStatus = `Anki: ${data.error}`;
        state.lastCardId = null;
        renderAnkiSync();
        return;
      }

      const cardId = data.result && data.result.cardId;
      if (!cardId || cardId === state.lastCardId) {
        // No change; refresh status text only.
        renderAnkiSync();
        return;
      }

      state.lastCardId = cardId;
      const question = data.result.question || "";
      const parsed = parseChordFromText(question);

      if (parsed) {
        applyAnkiChord(parsed);
      } else {
        state.detectedChord = null;
        state.ankiSyncStatus = "Card found, no chord parsed";
        renderAnkiSync();
      }
    } catch (e) {
      state.ankiSyncStatus = "Anki not reachable";
      state.lastCardId = null;
      renderAnkiSync();
    }
  }

  function startAnkiPolling() {
    if (ankiPollId) return;
    pollAnkiCard(); // immediate first check
    ankiPollId = setInterval(pollAnkiCard, 800);
  }

  function stopAnkiPolling() {
    if (ankiPollId) {
      clearInterval(ankiPollId);
      ankiPollId = null;
    }
    state.lastCardId = null;
    state.detectedChord = null;
    state.ankiSyncStatus = "Follow off";
  }

  function setAnkiFollow(enabled) {
    state.ankiFollow = enabled;
    if (enabled) startAnkiPolling();
    else stopAnkiPolling();
    renderAnkiSync();
  }

  // ---------- Derived getters ----------
  function currentQuality() {
    if (state.mode === "single") return SINGLE_QUALITIES[state.qualityIdx];
    if (state.mode === "extended") return EXTENDED[state.qualityIdx];
    return FAMILY[state.qualityIdx];
  }
  function symbol() {
    return `${state.root.name}${currentQuality().suffix}`;
  }
  function chordNotes() {
    return buildChord(state.root, currentQuality().tones);
  }
  function targetPcSet() {
    return pcSetOf(state.root, currentQuality().tones);
  }
  function key() {
    return symbol();
  }

  // ---------- MIDI ----------
  function refreshInputs(access) {
    const list = [];
    access.inputs.forEach((input) => list.push({ id: input.id, name: input.name || "MIDI Device" }));
    state.inputs = list;
    if (!state.selectedInputId && list.length) state.selectedInputId = list[0].id;
    attachMidiHandler();
    render();
  }

  function attachMidiHandler() {
    const access = state.midiAccess;
    if (!access || !state.selectedInputId) return;
    access.inputs.forEach((input) => { input.onmidimessage = null; });
    const input = access.inputs.get(state.selectedInputId);
    if (input) input.onmidimessage = handleMidiMessage;
  }

  function handleMidiMessage(e) {
    const [status, note, velocity] = e.data;
    const command = status & 0xf0;
    const isNoteOn = command === 0x90 && velocity > 0;
    const isNoteOff = command === 0x80 || (command === 0x90 && velocity === 0);

    if (isNoteOn) heldSet.add(note);
    else if (isNoteOff) heldSet.delete(note);
    else return;

    const heldPcs = new Set([...heldSet].map((n) => n % 12));
    state.heldNotesDisplay = [...heldSet].sort((a, b) => a - b).map((n) => noteName(n % 12, state.root.flat));

    renderHeldRow();

    if (!state.running) return;

    if (heldSet.size === 0) {
      if (state.phase === "armed" || state.phase === "success") {
        state.phase = "timing";
        readyTime = performance.now();
      }
      renderPhase();
      return;
    }

    if (state.phase === "timing" || state.phase === "armed") {
      if (setsEqual(heldPcs, targetPcSet())) {
        const elapsed = readyTime ? performance.now() - readyTime : 0;
        state.phase = "success";
        playChime();

        state.repCount += 1;
        state.repTimes = [...state.repTimes, elapsed];

        if (state.repTimes.length === 1) {
          recordFirstPress(elapsed);
        }

        if (state.repCount >= state.repTarget) {
          finishRound();
        } else {
          renderPhase();
          renderReps();
          renderStats();
        }
      }
    }
  }

  async function connectMidi() {
    try {
      const access = await navigator.requestMIDIAccess({ sysex: false });
      state.midiAccess = access;
      refreshInputs(access);
      state.midiConnected = true;
      access.onstatechange = () => refreshInputs(access);
      render();
    } catch (e) {
      state.midiSupported = false;
      render();
    }
  }

  if (!navigator.requestMIDIAccess) state.midiSupported = false;

  // ---------- Timer loop ----------
  function tick() {
    if (state.phase === "timing" && readyTime) {
      state.liveMs = performance.now() - readyTime;
      renderLiveTimer();
    }
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);

  // ---------- Drill control ----------
  function finishRound() {
    state.running = false;
    state.justCompleted = true;
    const times = state.repTimes;
    const avg = times.reduce((a, b) => a + b, 0) / times.length;
    const best = Math.min(...times);
    const prev = state.history[key()] || { bestAvgMs: Infinity, bestSingleMs: Infinity, totalReps: 0, bestFirstPressMs: Infinity };
    state.history[key()] = {
      ...prev,
      bestAvgMs: Math.min(prev.bestAvgMs, Math.round(avg)),
      bestSingleMs: Math.min(prev.bestSingleMs, Math.round(best)),
      totalReps: prev.totalReps + times.length,
    };
    saveHistory();
    render();
    
    // TRIGGER ANKI FLIP HERE
    flipAnkiCard();
  }

  // Tracks the time from the Start press (i.e. hands lifted, timer armed)
  // to the very first successfully played chord of a round, keeping the
  // fastest one ever seen per chord, similar to bestSingleMs / bestAvgMs.
  function recordFirstPress(ms) {
    const prev = state.history[key()] || { bestAvgMs: Infinity, bestSingleMs: Infinity, totalReps: 0, bestFirstPressMs: Infinity };
    if (prev.bestFirstPressMs === undefined) prev.bestFirstPressMs = Infinity;
    state.history[key()] = {
      ...prev,
      bestFirstPressMs: Math.min(prev.bestFirstPressMs, Math.round(ms)),
    };
    saveHistory();
  }

  function startDrill() {
    heldSet.clear();
    state.repCount = 0;
    state.repTimes = [];
    state.justCompleted = false;
    
    if (heldSet.size === 0) {
      state.phase = "timing";
      readyTime = performance.now();
    } else {
      state.phase = "armed";
      readyTime = null;
    }
    
    state.running = true;
    render();
  }

  function stopDrill() {
    state.running = false;
    state.phase = "idle";
    render();
  }

  function nextChord() {
    state.justCompleted = false;
    state.repCount = 0;
    state.repTimes = [];
    if (state.mode === "family") state.qualityIdx = (state.qualityIdx + 1) % FAMILY.length;
    else if (state.mode === "extended") state.qualityIdx = (state.qualityIdx + 1) % EXTENDED.length;
    else state.qualityIdx = (state.qualityIdx + 1) % SINGLE_QUALITIES.length;
    render();
  }

  function redoChord() {
    state.justCompleted = false;
    state.repCount = 0;
    state.repTimes = [];
    
    // Automatically reset phase based on whether keys are currently held
    if (heldSet.size === 0) {
      state.phase = "timing";
      readyTime = performance.now();
    } else {
      state.phase = "armed";
      readyTime = null;
    }
    
    state.running = true;
    render();
  }

  // ---------- Rendering ----------
  const el = {
    midiBar: document.getElementById("midiBar"),
    modeSeg: document.getElementById("modeSeg"),
    rootGrid: document.getElementById("rootGrid"),
    qualityGroup: document.getElementById("qualityGroup"),
    qualitySeg: document.getElementById("qualitySeg"),
    repSeg: document.getElementById("repSeg"),
    displayNotesSeg: document.getElementById("displayNotesSeg"), // <-- Added element reference
    shuffleSeg: document.getElementById("shuffleSeg"),
    ankiSyncSeg: document.getElementById("ankiSyncSeg"),
    ankiSyncStatus: document.getElementById("ankiSyncStatus"),
    familyStrip: document.getElementById("familyStrip"),
    symbolEl: document.getElementById("symbolEl"),
    chordNotesEl: document.getElementById("chordNotesEl"),
    statusPill: document.getElementById("statusPill"),
    liveTimerEl: document.getElementById("liveTimerEl"),
    heldRowEl: document.getElementById("heldRowEl"),
    repCountLabel: document.getElementById("repCountLabel"),
    firstChordLabel: document.getElementById("firstChordLabel"),
    avgLabel: document.getElementById("avgLabel"),
    progressFill: document.getElementById("progressFill"),
    startBtn: document.getElementById("startBtn"),
    startBtnText: document.getElementById("startBtnText"),
    stopBtn: document.getElementById("stopBtn"),
    completeBox: document.getElementById("completeBox"),
    completeText: document.getElementById("completeText"),
    redoBtn: document.getElementById("redoBtn"),
    nextBtn: document.getElementById("nextBtn"),
    nextBtnText: document.getElementById("nextBtnText"),
    statsRow: document.getElementById("statsRow"),
    statBest: document.getElementById("statBest"),
    statAvg: document.getElementById("statAvg"),
    statTotal: document.getElementById("statTotal"),
    statFirstPress: document.getElementById("statFirstPress"),
    resetStatsBtn: document.getElementById("resetStatsBtn"),
  };

  function renderMidiBar() {
    el.midiBar.innerHTML = "";
    if (!state.midiSupported) {
      const span = document.createElement("span");
      span.className = "midi-warn";
      span.textContent = "Web MIDI isn't supported in this browser.";
      el.midiBar.appendChild(span);
    } else if (!state.midiConnected) {
      const btn = document.createElement("button");
      btn.className = "btn connect-btn";
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2v6M15 2v6M12 17v5M6 9h12v3a6 6 0 0 1-12 0V9z"/></svg> Connect MIDI Keyboard`;
      btn.onclick = connectMidi;
      el.midiBar.appendChild(btn);
    } else {
      const row = document.createElement("div");
      row.className = "midi-connected-row";
      const piano = document.createElement("span");
      piano.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7FA37A" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 4v10M12 4v10M17 4v10"/></svg>`;
      row.appendChild(piano);
      const text = document.createElement("span");
      text.className = "midi-connected-text";
      text.textContent = state.inputs.length > 0 ? "Connected" : "No devices found";
      row.appendChild(text);
      if (state.inputs.length > 1) {
        const select = document.createElement("select");
        select.className = "midi-select";
        state.inputs.forEach((i) => {
          const opt = document.createElement("option");
          opt.value = i.id;
          opt.textContent = i.name;
          if (i.id === state.selectedInputId) opt.selected = true;
          select.appendChild(opt);
        });
        select.onchange = (e) => {
          state.selectedInputId = e.target.value;
          attachMidiHandler();
        };
        row.appendChild(select);
      } else if (state.inputs.length === 1) {
        const name = document.createElement("span");
        name.className = "midi-device-name";
        name.textContent = state.inputs[0].name;
        row.appendChild(name);
      }
      el.midiBar.appendChild(row);
    }
  }

  function renderModeSeg() {
    el.modeSeg.innerHTML = "";
    const modes = [
      { id: "single", label: "Single Shape", icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>` },
      { id: "family", label: "Family Cycle", icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>` },
      { id: "extended", label: "Extended Family", icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/></svg>` },
    ];
    modes.forEach((m) => {
      const btn = document.createElement("button");
      btn.className = "seg seg-btn" + (state.mode === m.id ? " seg-btn-active" : "");
      btn.innerHTML = `${m.icon} ${m.label}`;
      btn.onclick = () => { stopDrill(); state.mode = m.id; state.qualityIdx = 0; render(); };
      el.modeSeg.appendChild(btn);
    });
  }

  function renderRootGrid() {
    el.rootGrid.innerHTML = "";
    ROOTS.forEach((r) => {
      const btn = document.createElement("button");
      btn.className = "seg root-btn" + (state.root.pc === r.pc ? " seg-btn-active" : "");
      btn.textContent = r.name;
      btn.onclick = () => { stopDrill(); state.root = r; render(); };
      el.rootGrid.appendChild(btn);
    });
  }

  function renderQualitySeg() {
    if (state.mode !== "single") {
      el.qualityGroup.style.display = "none";
      return;
    }
    el.qualityGroup.style.display = "";
    el.qualitySeg.innerHTML = "";
    el.qualitySeg.className = "quality-groups";

    QUALITY_GROUPS.forEach((group) => {
      const groupEl = document.createElement("div");
      groupEl.className = "quality-group";

      const label = document.createElement("div");
      label.className = "quality-group-label";
      label.textContent = group.label;
      groupEl.appendChild(label);

      const row = document.createElement("div");
      row.className = "segmented";

      group.qualities.forEach((q) => {
        const globalIdx = SINGLE_QUALITIES.findIndex((sq) => sq.suffix === q.suffix);
        const btn = document.createElement("button");
        btn.className = "seg seg-btn" + (state.qualityIdx === globalIdx ? " seg-btn-active" : "");
        btn.textContent = q.suffix;
        btn.onclick = () => { stopDrill(); state.qualityIdx = globalIdx; render(); };
        row.appendChild(btn);
      });

      groupEl.appendChild(row);
      el.qualitySeg.appendChild(groupEl);
    });
  }

  function renderRepSeg() {
    el.repSeg.innerHTML = "";
    REP_TARGETS.forEach((n) => {
      const btn = document.createElement("button");
      btn.className = "seg seg-btn" + (state.repTarget === n ? " seg-btn-active" : "");
      btn.textContent = n;
      btn.onclick = () => { state.repTarget = n; render(); };
      el.repSeg.appendChild(btn);
    });

    // Custom rep-count input: lets the user set any number of reps.
    const input = document.createElement("input");
    input.type = "number";
    input.className = "rep-input";
    input.min = "1";
    input.max = "999";
    input.value = state.repTarget;
    input.title = "Custom reps";
    input.onchange = () => {
      let n = parseInt(input.value, 10);
      if (Number.isNaN(n) || n < 1) n = 1;
      if (n > 999) n = 999;
      state.repTarget = n;
      render();
    };
    el.repSeg.appendChild(input);
  }

  // ---------- New render function for display notes toggle ----------
  function renderDisplayNotesSeg() {
    el.displayNotesSeg.innerHTML = "";
    const options = [
      { value: true, label: "Show" },
      { value: false, label: "Hide" }
    ];
    options.forEach((opt) => {
      const btn = document.createElement("button");
      btn.className = "seg seg-btn" + (state.showNotes === opt.value ? " seg-btn-active" : "");
      btn.textContent = opt.label;
      btn.onclick = () => { state.showNotes = opt.value; render(); };
      el.displayNotesSeg.appendChild(btn);
    });
  }

  // ---------- New render function for shuffle / random chord ----------
  function renderShuffleBtn() {
    el.shuffleSeg.innerHTML = "";
    const btn = document.createElement("button");
    btn.className = "seg seg-btn";
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M3 4l5 5"/></svg> Random chord`;
    btn.onclick = () => {
      stopDrill();
      const qualities = state.mode === "family" ? FAMILY
        : state.mode === "extended" ? EXTENDED
        : SINGLE_QUALITIES;
      state.root = ROOTS[Math.floor(Math.random() * ROOTS.length)];
      state.qualityIdx = Math.floor(Math.random() * qualities.length);
      render();
    };
    el.shuffleSeg.appendChild(btn);
  }

  function renderAnkiSync() {
    el.ankiSyncSeg.innerHTML = "";
    const options = [
      { value: false, label: "Off" },
      { value: true, label: "Follow card" },
    ];
    options.forEach((opt) => {
      const btn = document.createElement("button");
      btn.className = "seg seg-btn" + (state.ankiFollow === opt.value ? " seg-btn-active" : "");
      btn.textContent = opt.label;
      btn.onclick = () => { setAnkiFollow(opt.value); };
      el.ankiSyncSeg.appendChild(btn);
    });

    el.ankiSyncStatus.textContent = state.ankiSyncStatus;
    el.ankiSyncStatus.className = "anki-sync-status" +
      (state.ankiFollow && state.detectedChord ? " anki-sync-status-active" : "") +
      (state.ankiFollow && !state.detectedChord && state.ankiSyncStatus.includes("not reachable")
        ? " anki-sync-status-error" : "");
  }

  function renderFamilyStrip() {
    if (state.mode !== "family" && state.mode !== "extended") {
      el.familyStrip.style.display = "none";
      return;
    }
    el.familyStrip.style.display = "flex";
    el.familyStrip.innerHTML = "";
    const list = state.mode === "extended" ? EXTENDED : FAMILY;
    list.forEach((q, i) => {
      const chip = document.createElement("div");
      let cls = "family-chip";
      if (i === state.qualityIdx) cls += " family-chip-active";
      else if (i < state.qualityIdx) cls += " family-chip-done";
      chip.className = cls;
      chip.textContent = q.suffix;
      el.familyStrip.appendChild(chip);
    });
  }

  function renderChordCard() {
    el.symbolEl.textContent = symbol();
    el.chordNotesEl.textContent = chordNotes().join("  ·  ");
    // Toggle visibility based on state
    el.chordNotesEl.style.visibility = state.showNotes ? "visible" : "hidden";
  }

  function renderPhase() {
    const phase = state.phase;
    const statusText =
      phase === "idle" ? "Press Start, then lift your hands off the keys"
      : phase === "armed" ? "Lift your hands fully off the keys"
      : phase === "timing" ? "Play it…"
      : "✓ Nice";
    el.statusPill.textContent = statusText;
    el.statusPill.className = "status-pill" +
      (phase === "timing" ? " status-timing" : "") +
      (phase === "success" ? " status-success" : "");
    renderLiveTimer();
  }

  function renderLiveTimer() {
    el.liveTimerEl.textContent = state.phase === "timing" ? `${(state.liveMs / 1000).toFixed(2)}s` : "—";
  }

  function renderHeldRow() {
    el.heldRowEl.textContent = state.heldNotesDisplay.length > 0
      ? `Holding: ${state.heldNotesDisplay.join(" ")}`
      : "No keys held";
  }

  function renderReps() {
    el.repCountLabel.textContent = `${state.repCount} / ${state.repTarget} reps`;
    if (state.repTimes.length > 0) {
      el.firstChordLabel.style.display = "";
      el.firstChordLabel.textContent = `first chord ${(state.repTimes[0] / 1000).toFixed(2)}s`;
    } else {
      el.firstChordLabel.style.display = "none";
    }
    const avgSoFar = state.repTimes.length ? state.repTimes.reduce((a, b) => a + b, 0) / state.repTimes.length : null;
    if (avgSoFar !== null) {
      el.avgLabel.style.display = "";
      el.avgLabel.textContent = `avg ${(avgSoFar / 1000).toFixed(2)}s`;
    } else {
      el.avgLabel.style.display = "none";
    }
    const progressPct = Math.min(state.repCount / state.repTarget, 1);
    el.progressFill.style.width = `${progressPct * 100}%`;
  }

  function renderButtons() {
    if (!state.running && !state.justCompleted) {
      el.startBtn.style.display = "flex";
      el.startBtn.disabled = !state.midiConnected;
      el.startBtnText.textContent = state.midiConnected ? "Start Drill" : "Connect MIDI first";
    } else {
      el.startBtn.style.display = "none";
    }

    el.stopBtn.style.display = state.running ? "flex" : "none";

    if (state.justCompleted) {
      el.completeBox.style.display = "flex";
      const avgSoFar = state.repTimes.reduce((a, b) => a + b, 0) / state.repTimes.length;
      const best = Math.min(...state.repTimes);
      const firstChord = state.repTimes[0];
      el.completeText.textContent = `${state.repTarget} reps — avg ${(avgSoFar / 1000).toFixed(2)}s, best ${(best / 1000).toFixed(2)}s, first chord ${(firstChord / 1000).toFixed(2)}s`;
      el.nextBtnText.textContent = (state.mode === "family" || state.mode === "extended") ? "Next in family" : "Next chord";
    } else {
      el.completeBox.style.display = "none";
    }
  }

  function renderStats() {
    // Keep the stats row (and its reset button) visible even when no history
    // exists for the current chord, so clicking "Clear stats" doesn't make
    // the stat boxes disappear.
    el.statsRow.style.display = "flex";
    const stats = state.history[key()];
    if (!stats) {
      el.statBest.textContent = "—";
      el.statAvg.textContent = "—";
      el.statTotal.textContent = "—";
      el.statFirstPress.textContent = "—";
      return;
    }
    el.statBest.textContent = `${(stats.bestSingleMs / 1000).toFixed(2)}s`;
    el.statAvg.textContent = `${(stats.bestAvgMs / 1000).toFixed(2)}s`;
    el.statTotal.textContent = stats.totalReps;
    el.statFirstPress.textContent = (stats.bestFirstPressMs !== undefined && isFinite(stats.bestFirstPressMs))
      ? `${(stats.bestFirstPressMs / 1000).toFixed(2)}s`
      : "—";
  }

  function render() {
    renderMidiBar();
    renderModeSeg();
    renderRootGrid();
    renderQualitySeg();
    renderRepSeg();
    renderDisplayNotesSeg(); // <-- Call the new render function
    renderShuffleBtn();
    renderAnkiSync();
    renderFamilyStrip();
    renderChordCard();
    renderPhase();
    renderHeldRow();
    renderReps();
    renderButtons();
    renderStats();
  }

  // ---------- Event bindings ----------
  el.startBtn.onclick = startDrill;
  el.stopBtn.onclick = stopDrill;
  el.redoBtn.onclick = redoChord;
  el.nextBtn.onclick = nextChord;
  el.resetStatsBtn.onclick = () => {
    delete state.history[key()];
    saveHistory();
    render();
  };

  // ---------- Initial render ----------
  render();
})();
</script>
</body>
</html>
